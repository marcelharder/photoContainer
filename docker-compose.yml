volumes:
  myapp:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.2.22,rw
      device: ":/volume1/fotoproject/fotos"
  mariadb-data:

networks:
  internal-container-network:
    driver: bridge
